  <text x="670" y="270" font-family="Arial" font-size="18" fill="#e5e7eb">Target: TCP/80</text>
  <text x="670" y="305" font-family="Arial" font-size="18" fill="#22c55e">Status: Confirmed</text>

  <rect x="95" y="380" width="470" height="180" rx="20" fill="#111827" stroke="#a855f7" stroke-width="3"/>
