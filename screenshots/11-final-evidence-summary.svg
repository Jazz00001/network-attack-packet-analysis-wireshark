  <text x="130" y="270" font-family="Arial" font-size="18" fill="#e5e7eb">Filter: icmp &amp;&amp; ip.dst == 192.168.1.3</text>
  <text x="130" y="305" font-family="Arial" font-size="18" fill="#22c55e">Status: Confirmed</text>

  <rect x="635" y="150" width="470" height="180" rx="20" fill="#111827" stroke="#f97316" stroke-width="3"/>
