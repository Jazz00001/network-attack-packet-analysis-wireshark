  <text x="130" y="500" font-family="Arial" font-size="18" fill="#e5e7eb">Target: TCP/22</text>
  <text x="130" y="535" font-family="Arial" font-size="18" fill="#22c55e">Status: Confirmed</text>

  <rect x="635" y="380" width="470" height="180" rx="20" fill="#111827" stroke="#22c55e" stroke-width="3"/>
